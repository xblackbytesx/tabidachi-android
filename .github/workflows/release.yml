name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: gradle assembleRelease

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign APK
        run: |
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="app/build/outputs/apk/release/tabidachi-${{ github.ref_name }}.apk"

          "${BUILD_TOOLS}/zipalign" -f 4 "${UNSIGNED}" "${ALIGNED}"
          "${BUILD_TOOLS}/apksigner" sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out "${SIGNED}" \
            "${ALIGNED}"

          echo "APK_PATH=${SIGNED}" >> $GITHUB_ENV

      - name: Clean up keystore
        if: always()
        run: rm -f keystore.jks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
